# =============================================================================
# GreenEdge — prj.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Serial / Console
# -----------------------------------------------------------------------------
CONFIG_SERIAL=y
CONFIG_CONSOLE=y

# -----------------------------------------------------------------------------
# Shell
# -----------------------------------------------------------------------------
CONFIG_SHELL=y
CONFIG_LOG_CMDS=y

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y

# -----------------------------------------------------------------------------
# Sensors / 1-Wire
# -----------------------------------------------------------------------------
CONFIG_W1=y
CONFIG_SENSOR=y
CONFIG_GPIO=y

# --- I2C ---
CONFIG_I2C=y
CONFIG_I2C_LOG_LEVEL_ERR=y
 
# --- SHT4x driver (Sensirion SHT40/SHT41/SHT45) ---
CONFIG_SHT4X=y

CONFIG_GREENEDGE_SENSOR_REAL=y

# -----------------------------------------------------------------------------
# WiFi (ESP32-C6 native driver via hal_espressif)
# -----------------------------------------------------------------------------
CONFIG_WIFI=y
CONFIG_HEAP_MEM_POOL_SIZE=98304

# Networking stack
CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

# DNS
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"

# Network management events (required for wifi_manager)
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_STACK_SIZE=1024

# Shell WiFi commands
CONFIG_NET_SHELL=y

# -----------------------------------------------------------------------------
# Settings API (persistent storage in flash)
# -----------------------------------------------------------------------------
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
